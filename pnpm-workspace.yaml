packages:
  - "."
  - "apps/*"

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.2.3
  vite-plus: 0.2.3

overrides:
  vite: "catalog:"
  "@types/react": "19.1.2"
  "@types/react-dom": "19.1.2"

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"

allowBuilds:
  esbuild: true
  sharp: true
